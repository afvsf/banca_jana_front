<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Alunos</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="./style.css">

</head>

<body class="bg-light">


<div class="container py-3">

    <div class="d-flex
                justify-content-between
                align-items-center
                mb-3">

        <h3>Alunos</h3>

        <button
            class="btn btn-primary"
            data-bs-toggle="modal"
            data-bs-target="#modalAluno">

            Novo

        </button>

    </div>


    <input
        type="text"
        class="form-control mb-3"
        placeholder="Buscar aluno"
        id="busca"
        onkeyup="buscarAluno()">


    <div id="listaAlunos"></div>

</div>


<!-- MODAL -->

<div
class="modal fade"
id="modalAluno">

<div class="modal-dialog">

<div class="modal-content border-0 rounded-4">

<div class="modal-header">

<h5>Novo Aluno</h5>

<button
class="btn-close"
data-bs-dismiss="modal"></button>

</div>


<div class="modal-body">

<input
type="hidden"
id="id">


<label>Nome</label>

<input
type="text"
id="nome"
class="form-control mb-3">


<label>Data Matrícula</label>

<input
type="date"
id="data_matricula"
class="form-control mb-3">


<label>Responsável</label>

<input
type="text"
id="responsavel"
class="form-control mb-3">


<label>Telefone</label>

<input
type="text"
id="telefone"
class="form-control mb-3">


<label>Mensalidade</label>

<input
type="number"
id="valor_mensalidade"
class="form-control mb-3">

</div>


<div class="modal-footer">

<button
class="btn btn-secondary"
data-bs-dismiss="modal">

Cancelar

</button>

<button
class="btn btn-success"
onclick="salvarAluno()">

Salvar

</button>

</div>

</div>

</div>

</div>


<script src=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

<script src="./alunos.js"></script>

</body>
</html>
