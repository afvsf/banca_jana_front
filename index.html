<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema Banca</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-light">


<div class="container">

    <div class="row vh-100 d-flex align-items-center">

        <div class="col-12">

            <div class="card shadow border-0 rounded-4 p-4">

                <h2 class="text-center mb-4">
                    Sistema Banca
                </h2>

                <input
                    type="email"
                    id="email"
                    class="form-control mb-3"
                    placeholder="E-mail">

                <input
                    type="password"
                    id="senha"
                    class="form-control mb-3"
                    placeholder="Senha">

                <button
                    class="btn btn-primary w-100"
                    onclick="login()">

                    Entrar

                </button>

            </div>

        </div>

    </div>

</div>

<script>

async function login(){

    const email =
        document.getElementById(
            'email'
        ).value;

    const senha =
        document.getElementById(
            'senha'
        ).value;

    const req =
        await fetch(

            `${API}/auth/login`,

            {

                method: 'POST',

                headers: {
                    'Content-Type':
                    'application/json'
                },

                body: JSON.stringify({
                    email,
                    senha
                })

            }

        );

    const dados =
        await req.json();

    if(dados.token){

        localStorage.setItem(
            'token',
            dados.token
        );

        window.location =
            'dashboard.html';

    }else{

        alert('Login inválido');

    }

}

</script>

</body>
</html>
